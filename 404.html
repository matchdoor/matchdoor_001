<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Matchdoor</title>
  <script>
    // GitHub Pages SPA redirect trick
    // เก็บ path ไว้ใน sessionStorage แล้ว redirect ไป root
    var path = window.location.pathname + window.location.search;
    sessionStorage.setItem('spa_redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
